<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,198,255,0.15) 10%, transparent 40%);
    animation: move 12s linear infinite;
    z-index: -1;
}

@keyframes move {
    from { transform: translate(0,0); }
    to { transform: translate(-50%, -50%); }
}

.container {
    padding: 60px 20px;
}

.logo {
    font-size: 3rem;
    font-weight: bold;
    letter-spacing: 3px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: #ccc;
    margin-bottom: 40px;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
}

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 20px;
    width: 260px;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card:hover {
    transform: translateY(-12px) scale(1.05);
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.card h2 {
    margin-bottom: 10px;
}

.card p {
    font-size: 0.9rem;
    color: #ddd;
}

.card a {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: black;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.card a:hover {
    color: white;
    transform: scale(1.05);
}

/* διαφορετικό χρώμα για ιατρείο */
.card.medical {
    background: rgba(0, 150, 120, 0.2);
}

.footer {
    margin-top: 60px;
    color: #aaa;
    font-size: 0.8rem;
}

@media (max-width: 600px) {
    .logo {
        font-size: 2rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">GKARAS ROBOTICS</div>
    <div class="subtitle">Συστήματα & Εφαρμογές</div>

    <div class="cards">

        <div class="card">
            <h2>ZEROING</h2>
            <p>Υπολογισμός τιμών μηδενισμού</p>
            <a href="https://gkarasrobotics.github.io/ZEROING/" target="_blank">Άνοιγμα</a>
        </div>

        <div class="card">
            <h2>ΚΑΤΑΝΟΜΗ</h2>
            <p>Σύστημα κατανομής υπηρεσιών</p>
            <a href="https://gkarasrobotics.github.io/KATANOMH/" target="_blank">Άνοιγμα</a>
        </div>

        <div class="card medical">
            <h2>MARGIMEDCLINICS</h2>
            <p>Σύστημα διαχείρισης ιατρείου</p>
            <a href="https://gkarasrobotics.github.io/-MARGIMEDCLINICS/" target="_blank">Άνοιγμα</a>
        </div>

        <div class="card PERSONEL">
            <h2>ΥΠΗΡΕΣΙΕΣ</h2>
            <p>ΚΑΤΑΝΟΜΗ ΣΤΕΛΕΧΩΝ</p>
            <a href="https://gkarasrobotics.github.io/PERSONEL/" target="_blank">Άνοιγμα</a>
        </div>

        <div class="card">
            <h2>GitHub</h2>
            <p>Δες όλα τα projects</p>
            <a href="https://github.com/gkarasrobotics" target="_blank">Profile</a>
        </div>

    </div>

    <div class="footer">
        © 2026 GKARAS ROBOTICS
    </div>

</div>

</body>
</html>
